function SMA(a,p){return a.map((_,i)=>i<p-1?null:avg(a.slice(i-p+1,i+1)))} function EMA(a,p){let o=Array(a.length).fill(null);if(a.length<p)return o;let k=2/(p+1),pr=avg(a.slice(0,p));o[p-1]=pr;for(let i=p;i<a.length;i++){pr=a[i]*k+pr*(1-k);o[i]=pr}return o}
function RSI(c,p=14){let o=Array(c.length).fill(null);if(c.length<=p)return o;let g=0,l=0;for(let i=1;i<=p;i++){let d=c[i]-c[i-1];d>=0?g+=d:l-=d}let ag=g/p,al=l/p;o[p]=al?100-100/(1+ag/al):100;for(let i=p+1;i<c.length;i++){let d=c[i]-c[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;o[i]=al?100-100/(1+ag/al):100}return o}

function ATR(h,l,c,p=14){let tr=c.map((x,i)=>i?Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])):h[i]-l[i]),o=Array(c.length).fill(null);if(c.length<p)return o;o[p-1]=avg(tr.slice(0,p));for(let i=p;i<c.length;i++)o[i]=(o[i-1]*(p-1)+tr[i])/p;return o}
function Boll(c,p=20,m=2){let mid=SMA(c,p),up=Array(c.length).fill(null),lo=Array(c.length).fill(null),w=Array(c.length).fill(null);for(let i=p-1;i<c.length;i++){let sd=std(c.slice(i-p+1,i+1));up[i]=mid[i]+m*sd;lo[i]=mid[i]-m*sd;w[i]=(up[i]-lo[i])/(mid[i]||1)}return{mid,up,lo,w}}

/* v5 KRİTİK DÜZELTME: Look-ahead bias düzeltildi.
   Eski kod: sinyal bar i'de (kapalı), entry bar i'nin kapanış fiyatından — gerçekçi değil.
   Yeni: sinyal bar i-1'e kadar veriyle üretilir, entry bar i'nin OPEN fiyatında olur.
   Ayrıca commission (%0.06) + slippage (%0.04) eklendi — Vercel sandbox'ta gerçekçi PnL. */
function runBt(c){
  let cash=st.settings.accountSize,pos=null,tr=[],eq=[cash];
  const fee=0.0006,slip=0.0004;
  const enterPx=(open,side)=>side==="long"?open*(1+slip+fee):open*(1-slip-fee);
  const exitPx=(px,side)=>side==="long"?px*(1-slip-fee):px*(1+slip+fee);
  let btcCtx={dp:50,entropy:50,state:"EXPANSION",isChaotic:false};
  for(let i=90;i<c.length;i++){
    /* Sinyal: bar i-1 ve öncesi. Entry: bar i'nin OPEN'ı. */
    let dataUpToPrev=c.slice(0,i),a=analyze("BT",dataUpToPrev,btcCtx,"MOCK",null,"mock",null),bar=c[i];
    if(pos){
      if(pos.side=="long"){
        if(bar.low<=pos.stop){let ex=exitPx(pos.stop,"long"),pnl=(ex-pos.entry)*pos.size;cash+=pnl;tr.push({...pos,exit:ex,pnl,time:bar.time,why:"STOP"});pos=null}
        else if(bar.high>=pos.tp){let ex=exitPx(pos.tp,"long"),pnl=(ex-pos.entry)*pos.size;cash+=pnl;tr.push({...pos,exit:ex,pnl,time:bar.time,why:"TP"});pos=null}
      }else if(pos.side=="short"){
        if(bar.high>=pos.stop){let ex=exitPx(pos.stop,"short"),pnl=(pos.entry-ex)*pos.size;cash+=pnl;tr.push({...pos,exit:ex,pnl,time:bar.time,why:"STOP"});pos=null}
        else if(bar.low<=pos.tp){let ex=exitPx(pos.tp,"short"),pnl=(pos.entry-ex)*pos.size;cash+=pnl;tr.push({...pos,exit:ex,pnl,time:bar.time,why:"TP"});pos=null}
      }
    }
    if(!pos&&a.signal&&a.signal.includes("LONG")){
      let entry=enterPx(bar.open,"long"),risk=Math.abs(entry-a.plan.stop);
      if(risk>0){let size=cash*0.01/risk,maxNotional=cash*0.25;if(size*entry>maxNotional)size=maxNotional/entry;
        pos={side:"long",entry,stop:a.plan.stop,tp:a.plan.tp2,size,time:bar.time,signal:a.signal}}
    }else if(!pos&&a.signal&&a.signal.includes("SHORT")){
      let entry=enterPx(bar.open,"short"),risk=Math.abs(a.plan.stop-entry);
      if(risk>0){let size=cash*0.01/risk,maxNotional=cash*0.25;if(size*entry>maxNotional)size=maxNotional/entry;
        pos={side:"short",entry,stop:a.plan.stop,tp:a.plan.tp2,size,time:bar.time,signal:a.signal}}
    }
    eq.push(cash);
  }
  let wins=tr.filter(x=>x.pnl>0),loss=tr.filter(x=>x.pnl<=0),pnl=tr.reduce((s,x)=>s+x.pnl,0),win=tr.length?wins.length/tr.length:0,
    pf=wins.reduce((s,x)=>s+x.pnl,0)/(Math.abs(loss.reduce((s,x)=>s+x.pnl,0))||1),peak=eq[0],dd=0;
  eq.forEach(x=>{peak=Math.max(peak,x);dd=Math.max(dd,(peak-x)/peak)});
  return{trades:tr,pnl,ret:pnl/st.settings.accountSize*100,win,pf,dd}}

function confidenceLevel(signal,quality,harmony,entropy,contr,plan){let score=clamp(quality+harmony*.15-entropy*.22-contr*.30+(plan?.rr>=2?6:plan?.rr>=1.5?3:-4));let level=score>=75?"YÜKSEK":score>=58?"ORTA":"DÜŞÜK";let style=score>=75?"Standart":score>=58?"Konservatif":"Küçük/İzle";return{score,level,style,riskPct:plan?.riskScale?Math.round(plan.riskScale*100):100}}
/* v5: Fakeout için 2 bar follow-through onayı eklendi. Tek bar wick'i artık otomatik fakeout sayılmıyor.
   Mantık: sweep barından sonraki 1-2 barın level'ı yeniden aşıp aşmadığına bakılır. Aşılırsa "iptal".
   Hala temiz fakeout için skor maks; kısmi onay için skor düşük. */
function fakeoutDetector(c,t,lv){if(!c||c.length<25)return{type:"YOK",score:0,text:"Yeterli veri yok"};
  let n=c.length,sweepIdx=n-3;
  if(sweepIdx<22)return{type:"YOK",score:0,text:"Yeterli veri yok"};
  let sweepBar=c[sweepIdx],prev=c.slice(sweepIdx-20,sweepIdx),ph=Math.max(...prev.map(p=>p.high)),pl=Math.min(...prev.map(p=>p.low));
  let range=sweepBar.high-sweepBar.low||1,upper=(sweepBar.high-Math.max(sweepBar.open,sweepBar.close))/range,lower=(Math.min(sweepBar.open,sweepBar.close)-sweepBar.low)/range,vr=t.volRatio||1;
  let after1=c[sweepIdx+1],after2=c[sweepIdx+2];
  let type="YOK",score=0,text="Belirgin likidite avı yok.";
  if(sweepBar.high>ph&&sweepBar.close<ph&&upper>.42){
    let canceled=(after1&&after1.high>ph)||(after2&&after2.high>ph);
    if(canceled){type="BULL TRAP İPTAL";score=clamp(20+upper*15);text="Sweep sonrası fiyat tekrar direnci aştı; fakeout iptal — momentum continuation."}
    else{let confirmed=(after1&&after1.close<ph)&&(after2?after2.close<ph:true);type="BULL TRAP";score=clamp(55+upper*40+(vr>1.2?10:0)+(confirmed?10:-15));text=confirmed?"Direnç süpürme + 2 bar onaylı fakeout. Stop hunt teyitli.":"Direnç süpürme tespit edildi ama follow-through zayıf."}}
  if(sweepBar.low<pl&&sweepBar.close>pl&&lower>.42){
    let canceled=(after1&&after1.low<pl)||(after2&&after2.low<pl);
    if(canceled){type="BEAR TRAP İPTAL";score=clamp(20+lower*15);text="Sweep sonrası fiyat tekrar destek altı; fakeout iptal — düşüş continuation."}
    else{let confirmed=(after1&&after1.close>pl)&&(after2?after2.close>pl:true);type="BEAR TRAP";score=clamp(55+lower*40+(vr>1.2?10:0)+(confirmed?10:-15));text=confirmed?"Destek süpürme + 2 bar onaylı fakeout. Stop hunt teyitli.":"Destek süpürme tespit edildi ama follow-through zayıf."}}
  return{type,score,text}}

function cloneWeights(w){return {trend:+(w?.trend||25),momentum:+(w?.momentum||20),liquidity:+(w?.liquidity||20),volume:+(w?.volume||15),btc:+(w?.btc||10),entropy:+(w?.entropy||20)}}

function btDefaults(){return {commission:0.06,slippage:0.04,riskPct:st.settings.riskPct||1,partialTp:true,trailing:true,maxDailyLoss:3,stopAfterDailyLoss:true}}
function btEquityStats(eq){let peak=eq[0]||1,dd=0,ddSeries=[];eq.forEach(x=>{peak=Math.max(peak,x);let d=(peak-x)/(peak||1);dd=Math.max(dd,d);ddSeries.push(d)});let rets=[];for(let i=1;i<eq.length;i++)rets.push((eq[i]-eq[i-1])/(eq[i-1]||1));let sharpe=rets.length&&std(rets)?avg(rets)/std(rets)*Math.sqrt(252):0;return {maxDd:dd,ddSeries,sharpe}}
function runAdvancedBt(c,weights=st.settings.weights,opts=btDefaults(),rangeStart=90,rangeEnd=null){
  rangeEnd=rangeEnd||c.length;
  if(!c||c.length<120||rangeEnd-rangeStart<25)return {trades:[],eq:[st.settings.accountSize],pnl:0,ret:0,win:0,pf:0,dd:0,expectancy:0,avgR:0,sharpe:0,byState:{},bySide:{},bySignal:{}};
  let cash=st.settings.accountSize,eq=[cash],pos=null,tr=[],dayKey=null,dayStart=cash,blocked=false;
  const feeSlip=(px,side,entry=true)=>{let slip=(opts.slippage||0)/100,fee=(opts.commission||0)/100;return side=="long"?(entry?px*(1+slip+fee):px*(1-slip-fee)):(entry?px*(1-slip-fee):px*(1+slip+fee))}
  const closePos=(bar,exit,why)=>{
    if(!pos)return;
    let exitPx=feeSlip(exit,pos.side,false),qty=pos.qtyLeft, pnl=pos.side=="long"?(exitPx-pos.entry)*qty:(pos.entry-exitPx)*qty, r=pos.initialRisk? pnl/(pos.initialRisk*qty):0;
    cash+=pnl; tr.push({...pos,exit:exitPx,pnl,why,time:bar.time,r,status:why}); pos=null;
  };
  return withWeights(weights,()=>{
    for(let i=rangeStart;i<rangeEnd;i++){
      let bar=c[i],d=new Date(bar.time).toISOString().slice(0,10);
      if(dayKey!==d){dayKey=d;dayStart=cash;blocked=false}
      if(opts.stopAfterDailyLoss && ((cash-dayStart)/dayStart*100)<=-(opts.maxDailyLoss||3))blocked=true;
      if(pos){

          if(bar.low<=pos.stop){closePos(bar,pos.stop,"STOP");}
          else{
            if(opts.partialTp && !pos.tp1Hit && bar.high>=pos.tp1){let q=pos.qty*.5,ex=feeSlip(pos.tp1,"long",false),pnl=(ex-pos.entry)*q;cash+=pnl;pos.qtyLeft-=q;pos.tp1Hit=true;pos.stop=pos.entry;tr.push({...pos,exit:ex,pnl,why:"TP1_KISMİ",time:bar.time,r:pnl/(pos.initialRisk*q||1),status:"TP1_KISMİ"});}
            if(pos && opts.trailing && pos.tp1Hit)pos.stop=Math.max(pos.stop,bar.close-(pos.atr||0)*1.2);
            if(pos && bar.high>=pos.tp2)closePos(bar,pos.tp2,"TP2");
            else if(pos && bar.high>=pos.tp3)closePos(bar,pos.tp3,"TP3");
          }
        }else{
          if(bar.high>=pos.stop){closePos(bar,pos.stop,"STOP");}
          else{

            if(pos && opts.trailing && pos.tp1Hit)pos.stop=Math.min(pos.stop,bar.close+(pos.atr||0)*1.2);
            if(pos && bar.low<=pos.tp2)closePos(bar,pos.tp2,"TP2");
            else if(pos && bar.low<=pos.tp3)closePos(bar,pos.tp3,"TP3");
          }
        }
      }
      if(!pos && !blocked){
        /* v5: Look-ahead fix. Sinyal i-1'e kadar veriyle. Entry bar i'nin OPEN'ında. */
        let a=analyze("BT",c.slice(0,i),50,"MOCK",null,"mock",null),px=bar.open;
        if(a.signal.includes("LONG")||a.signal.includes("SHORT")){
          let side=a.signal.includes("SHORT")?"short":"long",entry=feeSlip(px,side,true),risk=Math.abs(entry-a.plan.stop);
          if(risk>0){
            let qty= cash*((opts.riskPct||1)/100)/risk;
            /* Position sizing cap: max 25% of cash notional */
            let maxNotional=cash*0.25;if(qty*entry>maxNotional)qty=maxNotional/entry;
            pos={side,signal:a.signal,state:a.state,entry,stop:a.plan.stop,tp1:a.plan.tp1,tp2:a.plan.tp2,tp3:a.plan.tp3,qty,qtyLeft:qty,initialRisk:risk,atr:a.tech?.atr||0,time:bar.time,tp1Hit:false};
          }
        }
      }
      eq.push(cash);
    }
    if(pos)closePos(c[rangeEnd-1],c[rangeEnd-1].close,"KAPANIŞ");
    let wins=tr.filter(x=>x.pnl>0),loss=tr.filter(x=>x.pnl<=0),pnl=tr.reduce((s,x)=>s+x.pnl,0),grossWin=wins.reduce((s,x)=>s+x.pnl,0),grossLoss=Math.abs(loss.reduce((s,x)=>s+x.pnl,0));
    let byState={},bySide={},bySignal={}; tr.forEach(t=>{[["byState",byState,t.state],["bySide",bySide,t.side],["bySignal",bySignal,t.signal]].forEach(([_,obj,k])=>{k=k||"Bilinmiyor";obj[k]=obj[k]||{n:0,pnl:0,w:0};obj[k].n++;obj[k].pnl+=t.pnl;if(t.pnl>0)obj[k].w++})});
    let stats=btEquityStats(eq),expectancy=tr.length?pnl/tr.length:0,avgR=tr.length?avg(tr.map(x=>x.r||0)):0;
    return {trades:tr,eq,pnl,ret:pnl/st.settings.accountSize*100,win:tr.length?wins.length/tr.length:0,pf:grossWin/(grossLoss||1),dd:stats.maxDd,expectancy,avgR,sharpe:stats.sharpe,byState,bySide,bySignal,weights:cloneWeights(weights),opts};
  });
}

function researchScore(r){return (r.pf||0)*40 + (r.win||0)*25 + (r.avgR||0)*12 + (r.sharpe||0)*7 - (r.dd||0)*90 + Math.max(-20,Math.min(20,(r.ret||0)/2))}
function optimizerResults(c){return WEIGHT_PRESETS.map(p=>{let r=runAdvancedBt(c,p.weights,btDefaults());return {...p,result:r,score:researchScore(r)}}).sort((a,b)=>b.score-a.score)}
function walkForward(c){
  if(!c||c.length<160)return {rows:[],summary:null};
  let train=90,test=30,rows=[],start=90;
  while(start+test<=c.length){
    let trainStart=Math.max(40,start-train),trainEnd=start,testEnd=Math.min(c.length,start+test);
    let trainSeg=c.slice(0,trainEnd),tests=optimizerResults(trainSeg),best=tests[0];
    let testResult=runAdvancedBt(c,best.weights,btDefaults(),start,testEnd);
    rows.push({trainStart,trainEnd,testStart:start,testEnd,best:best.name,weights:best.weights,trainScore:best.score,test:testResult});
    start+=test;
  }
  let pnl=rows.reduce((s,x)=>s+x.test.pnl,0),tr=rows.reduce((s,x)=>s+x.test.trades.length,0),wins=rows.reduce((s,x)=>s+x.test.trades.filter(t=>t.pnl>0).length,0),dd=Math.max(0,...rows.map(x=>x.test.dd||0));
  return {rows,summary:{pnl,ret:pnl/st.settings.accountSize*100,trades:tr,win:tr?wins/tr:0,dd}};
}

/* ===================== v4.2 Price Action Engine ===================== */
function candleStats(x){
  let range=(x.high-x.low)||1,body=Math.abs(x.close-x.open),bull=x.close>=x.open;
  return {
    range, body, bull,
    bodyRatio:body/range,
    upperWick:(x.high-Math.max(x.open,x.close))/range,
    lowerWick:(Math.min(x.open,x.close)-x.low)/range,
    closePos:(x.close-x.low)/range
  }
}
function swingPoints(c,lb=3){
  let hi=[],lo=[];
  for(let i=lb;i<c.length-lb;i++){
    let H=true,L=true;
    for(let j=i-lb;j<=i+lb;j++){
      if(j===i)continue;
      if(c[j].high>=c[i].high)H=false;
      if(c[j].low<=c[i].low)L=false;
    }
    if(H)hi.push({i,price:c[i].high,time:c[i].time});
    if(L)lo.push({i,price:c[i].low,time:c[i].time});
  }
  return {hi,lo};
}
function paMarketStructure(c){
  if(!c||c.length<40)return {bias:"NÖTR",score:50,event:"Yetersiz veri",detail:"Piyasa yapısı için yeterli mum yok."};
  let sp=swingPoints(c,3),hi=sp.hi.slice(-4),lo=sp.lo.slice(-4),price=c.at(-1).close;
  let lastHigh=hi.at(-1),prevHigh=hi.at(-2),lastLow=lo.at(-1),prevLow=lo.at(-2);
  let hh=lastHigh&&prevHigh&&lastHigh.price>prevHigh.price, hl=lastLow&&prevLow&&lastLow.price>prevLow.price;
  let lh=lastHigh&&prevHigh&&lastHigh.price<prevHigh.price, ll=lastLow&&prevLow&&lastLow.price<prevLow.price;
  let bosUp=lastHigh&&price>lastHigh.price, bosDown=lastLow&&price<lastLow.price;
  let bias="NÖTR",score=50,event="Yapı kararsız";
  if((hh&&hl)||bosUp){bias="BULLISH";score=bosUp?78:68;event=bosUp?"BOS yukarı":"HH/HL yapısı";}
  if((lh&&ll)||bosDown){bias="BEARISH";score=bosDown?22:32;event=bosDown?"BOS aşağı":"LH/LL yapısı";}
  let choch=null;
  if(hh&&hl&&lastLow&&price<lastLow.price){choch="Bullish yapıdan bearish CHOCH";bias="BEARISH";score=30;event="CHOCH aşağı";}
  if(lh&&ll&&lastHigh&&price>lastHigh.price){choch="Bearish yapıdan bullish CHOCH";bias="BULLISH";score=70;event="CHOCH yukarı";}
  return {bias,score,event,choch,hh,hl,lh,ll,lastHigh,lastLow,detail:`${event}. Son swing high ${lastHigh?fmt(lastHigh.price):"-"}, son swing low ${lastLow?fmt(lastLow.price):"-"}.`};
}
function detectFVG(c){
  let out=[];
  if(!c||c.length<5)return out;
  for(let i=2;i<c.length;i++){
    let a=c[i-2],b=c[i-1],d=c[i];
    let impulse=Math.abs(b.close-b.open)/((b.high-b.low)||1)>.55;
    if(a.high<d.low){
      out.push({type:"Bullish FVG",dir:"bull",i,low:a.high,high:d.low,mid:(a.high+d.low)/2,mitigated:false,impulse});
    }
    if(a.low>d.high){
      out.push({type:"Bearish FVG",dir:"bear",i,low:d.high,high:a.low,mid:(a.low+d.high)/2,mitigated:false,impulse});
    }
  }
  out.forEach(g=>{
    for(let j=g.i+1;j<c.length;j++){
      if(c[j].low<=g.high&&c[j].high>=g.low){g.mitigated=true;g.mitigationIndex=j;break}
    }
  });
  return out.slice(-12);
}
function detectOrderBlocks(c){
  let obs=[];
  if(!c||c.length<30)return obs;
  let atr=ATR(c.map(x=>x.high),c.map(x=>x.low),c.map(x=>x.close)).at(-1)||c.at(-1).close*.01;
  for(let i=5;i<c.length-3;i++){
    let x=c[i],s=candleStats(x),next=c.slice(i+1,i+4);
    let upImpulse=next.some(n=>n.close>x.high+atr*.55),downImpulse=next.some(n=>n.close<x.low-atr*.55);
    if(!s.bull&&upImpulse)obs.push({type:"Bullish Order Block",dir:"bull",i,low:x.low,high:x.high,mitigated:false,strength:clamp(55+s.bodyRatio*25+(upImpulse?15:0))});
    if(s.bull&&downImpulse)obs.push({type:"Bearish Order Block",dir:"bear",i,low:x.low,high:x.high,mitigated:false,strength:clamp(55+s.bodyRatio*25+(downImpulse?15:0))});
  }
  obs.forEach(o=>{
    for(let j=o.i+4;j<c.length;j++){
      if(c[j].low<=o.high&&c[j].high>=o.low){o.mitigated=true;o.mitigationIndex=j;break}
    }
  });
  return obs.slice(-12);
}
function detectBreakerBlocks(c, obs){
  let price=c.at(-1)?.close, out=[];
  (obs||[]).forEach(o=>{
    if(o.dir==="bull" && price<o.low)out.push({...o,type:"Bearish Breaker Block",dir:"bear",broken:true});
    if(o.dir==="bear" && price>o.high)out.push({...o,type:"Bullish Breaker Block",dir:"bull",broken:true});
  });
  return out.slice(-8);
}
function detectLiquiditySweeps(c){
  if(!c||c.length<30)return [];
  let out=[], recent=c.slice(-40), lastC=c.at(-1), stt=candleStats(lastC);
  let prev=recent.slice(0,-1),ph=Math.max(...prev.map(x=>x.high)),pl=Math.min(...prev.map(x=>x.low));
  if(lastC.high>ph&&lastC.close<ph&&stt.upperWick>.35)out.push({type:"Buy-side Sweep / Bull Trap",dir:"bear",score:clamp(65+stt.upperWick*35),level:ph,comment:"Önceki tepe üstü süpürülmüş, kapanış tekrar seviye altında."});
  if(lastC.low<pl&&lastC.close>pl&&stt.lowerWick>.35)out.push({type:"Sell-side Sweep / Bear Trap",dir:"bull",score:clamp(65+stt.lowerWick*35),level:pl,comment:"Önceki dip altı süpürülmüş, kapanış tekrar seviye üstünde."});
  return out;
}
function candlePsychology(c){
  if(!c||!c.length)return {type:"Yok",score:50,comment:"Veri yok"};
  let x=c.at(-1),s=candleStats(x),prev=c.at(-2)||x;
  if(s.bodyRatio>.65&&s.closePos>.75)return {type:"Güçlü Bullish Momentum Mumu",dir:"bull",score:75,comment:"Son mum geniş gövdeli ve üst bölgeye yakın kapanmış; alıcı kontrolü güçlü."};
  if(s.bodyRatio>.65&&s.closePos<.25)return {type:"Güçlü Bearish Momentum Mumu",dir:"bear",score:25,comment:"Son mum geniş gövdeli ve alt bölgeye yakın kapanmış; satıcı kontrolü güçlü."};
  if(s.upperWick>.45&&s.bodyRatio<.45)return {type:"Üst Fitilli Rejection",dir:"bear",score:38,comment:"Üst fitil belirgin; yukarı deneme satışla karşılanmış."};
  if(s.lowerWick>.45&&s.bodyRatio<.45)return {type:"Alt Fitilli Rejection",dir:"bull",score:62,comment:"Alt fitil belirgin; aşağı deneme alıcıyla karşılanmış."};
  if(s.bodyRatio<.18)return {type:"Doji / Kararsız Mum",dir:"neutral",score:50,comment:"Son mum kararsız; teyit beklemek daha sağlıklı."};
  if(x.close>prev.high)return {type:"Outside Bullish Close",dir:"bull",score:68,comment:"Kapanış önceki mumun üstünde; kısa vadeli momentum pozitif."};
  if(x.close<prev.low)return {type:"Outside Bearish Close",dir:"bear",score:32,comment:"Kapanış önceki mumun altında; kısa vadeli momentum negatif."};
  return {type:"Nötr Mum",dir:"neutral",score:50,comment:"Son mum tek başına belirgin karar üretmiyor."};
}
function detectClassicPatterns(c){
  let out=[];
  if(!c||c.length<60)return out;
  let sp=swingPoints(c,4),hi=sp.hi.slice(-8),lo=sp.lo.slice(-8),price=c.at(-1).close, atr=ATR(c.map(x=>x.high),c.map(x=>x.low),c.map(x=>x.close)).at(-1)||price*.01;
  let tol=Math.max(atr*1.1,price*.012);
  if(hi.length>=2){
    let a=hi.at(-2),b=hi.at(-1);
    if(Math.abs(a.price-b.price)<=tol && price<Math.min(a.price,b.price)-atr*.25)out.push({type:"Double Top",dir:"bear",score:68,comment:"Benzer dirençten iki reddedilme ve zayıflama gözleniyor."});
  }
  if(lo.length>=2){
    let a=lo.at(-2),b=lo.at(-1);
    if(Math.abs(a.price-b.price)<=tol && price>Math.max(a.price,b.price)+atr*.25)out.push({type:"Double Bottom",dir:"bull",score:68,comment:"Benzer destekten iki tepki ve toparlanma gözleniyor."});
  }
  if(hi.length>=3){
    let a=hi.at(-3),b=hi.at(-2),d=hi.at(-1);
    if(b.price>a.price && b.price>d.price && Math.abs(a.price-d.price)<=tol*1.5)out.push({type:"Head and Shoulders",dir:"bear",score:62,comment:"Omuz-baş-omuz aday yapısı var; neckline teyidi gerekir."});
  }
  if(lo.length>=3){
    let a=lo.at(-3),b=lo.at(-2),d=lo.at(-1);
    if(b.price<a.price && b.price<d.price && Math.abs(a.price-d.price)<=tol*1.5)out.push({type:"Inverse Head and Shoulders",dir:"bull",score:62,comment:"Ters OBO aday yapısı var; neckline teyidi gerekir."});
  }
  let recent=c.slice(-35),highSlope=(recent.at(-1).high-recent[0].high)/recent[0].high,lowSlope=(recent.at(-1).low-recent[0].low)/recent[0].low;
  let rangeNow=Math.max(...recent.slice(-10).map(x=>x.high))-Math.min(...recent.slice(-10).map(x=>x.low));
  let rangeOld=Math.max(...recent.slice(0,10).map(x=>x.high))-Math.min(...recent.slice(0,10).map(x=>x.low));
  if(rangeNow<rangeOld*.72)out.push({type:"Triangle / Sıkışma",dir:"neutral",score:58,comment:"Volatilite daralıyor; kırılım yönü beklenmeli."});
  if(highSlope>0&&lowSlope>0&&rangeNow<rangeOld*.9)out.push({type:"Rising Wedge",dir:"bear",score:56,comment:"Yükselen sıkışma var; momentum kaybı görülürse long riski artar."});

function paContextRisk(a, pa){

    if(d>0&&d<1.2)risks.push("Dirence yakın");
  }
  if(lv?.nearestSupport&&price){
    let d=(price-lv.nearestSupport.price)/price*100;
    if(d>0&&d<1.2)risks.push("Desteğe yakın");
  }
  if((a.field?.entropy||0)>68)risks.push("Entropi yüksek");
  if(pa?.liquidity?.some(x=>x.dir==="bear"))risks.push("Üst likidite süpürmesi");
  if(pa?.liquidity?.some(x=>x.dir==="bull"))risks.push("Alt likidite süpürmesi");

}
function paEngine(a){

  if(!c.length)return {score:0,confirmation:"Yok",risk:"Veri yok",detected:"Veri yok",comment:"PA analizi için veri yok.",items:[]};
  let ms=paMarketStructure(c),fvg=detectFVG(c),obs=detectOrderBlocks(c),breakers=detectBreakerBlocks(c,obs),liq=detectLiquiditySweeps(c),candle=candlePsychology(c),patterns=detectClassicPatterns(c);
  let price=a.price||c.at(-1).close;
  let activeFvg=fvg.filter(g=>price>=g.low&&price<=g.high || (!g.mitigated&&Math.abs(price-g.mid)/price<.025)).at(-1);
  let activeOb=obs.filter(o=>price>=o.low&&price<=o.high || (!o.mitigated&&Math.abs(price-(o.low+o.high)/2)/price<.025)).at(-1);
  let activeBreaker=breakers.at(-1);
  let items=[];

  if(activeBreaker)items.push(activeBreaker);

  if(activeBreaker)dirScore += activeBreaker.dir==="bull"?9:-9;
  if(candle.dir==="bull")dirScore+=8; if(candle.dir==="bear")dirScore-=8;
  liq.forEach(x=>dirScore += x.dir==="bull"?10:-10);
  patterns.forEach(x=>{if(x.dir==="bull")dirScore+=5;if(x.dir==="bear")dirScore-=5});
  let score=clamp(dirScore);

  if(activeOb)detected.push(`${activeOb.type}${activeOb.mitigated?" + Mitigation":""}`);
  if(activeBreaker)detected.push(activeBreaker.type);

  if(!detected.length)detected.push(ms.event);
  let temp={liquidity:liq},risk=paContextRisk(a,temp);

}

function paImpact(a,pa){

  let adjust=0, impact="Nötr";

    adjust = pa.score>=70?8:pa.score<45?-18:0;

    if(pa.risk?.includes("Dirence yakın"))adjust-=10;

  if(a.signal.includes("SHORT")){
    adjust = pa.score<=35?8:pa.score>58?-18:0;
    if(pa.liquidity?.some(x=>x.type.includes("Bear Trap")))adjust-=22;
    if(pa.risk?.includes("Desteğe yakın"))adjust-=10;
  }
  let final=a.signal;
  if(adjust<=-18)final="WAIT";
  if(adjust>=8&&a.signal=="LONG")final="STRONG_LONG";
  if(adjust>=8&&a.signal=="SHORT")final="STRONG_SHORT";
  impact=adjust>0?"Sinyali güçlendirir":adjust<0?"Sinyali zayıflatır":"Nötr";
  return {final,impact,adjust};
}

function paBacktestCompare(c,weights=st.settings.weights,opts=btDefaults()){

function setupType(a,pa){

  if(pa.detected?.includes("Order Block")) return pa.score>=50 ? "Order Block Retest Long" : "Order Block Retest Short";
  if(pa.detected?.includes("Breaker")) return pa.score>=50 ? "Breaker Block Retest Long" : "Breaker Block Retest Short";
  if((pa.liquidity||[]).some(x=>x.dir==="bull")) return "Liquidity Sweep Reversal Long";
  if((pa.liquidity||[]).some(x=>x.dir==="bear")) return "Liquidity Sweep Reversal Short";
  if(a.state==="COMPRESSION") return "Compression → Expansion Adayı";

  if(a.state==="BREAKDOWN" || (a.signal||"").includes("SHORT")) return "Trend Continuation Short";

  if(a.levels?.nearestResistance && a.price && ((a.levels.nearestResistance.price-a.price)/a.price*100)<1.5) return "Range Rejection / Resistance Reaction";
  return "Genel Omninomics Setup";

function setupGrade(a,pa,smart){
  let q=Math.max(a.longQ||0,a.shortQ||0);
  let score=0, reasons=[];
  score += (q-50)*.55;
  score += ((a.field?.harmony||50)-50)*.55;
  score -= Math.max(0,(a.field?.entropy||50)-55)*.75;
  score += (pa.score-50)*.55;
  if(pa.confirmation==="Güçlü"){score+=10;reasons.push("PA teyidi güçlü")}
  if(pa.confirmation==="Orta"){score+=4;reasons.push("PA teyidi orta")}
  if(a.source&&String(a.source).startsWith("LIVE")){score+=4;reasons.push("Canlı veri")}
  if((a.field?.contradiction||0)>35){score-=8;reasons.push("Çelişki yüksek")}
  if(pa.risk&&pa.risk!=="Belirgin ek risk yok"){score-=7;reasons.push(pa.risk)}
  if(smart?.final==="WAIT"||smart?.final==="NO_TRADE"){score-=12;reasons.push("PA filtresi sinyali düşürdü")}
  if(a.confidence?.level==="YÜKSEK"){score+=6;reasons.push("Omninomics güven yüksek")}
  let s=clamp(50+score);

function exitOptimization(a){
  if(!a?.candles?.length)return [];
  const multipliers=[0.8,1.0,1.2,1.5,1.8,2.0,2.5];
  const dir=(a.signal||"").includes("SHORT")?"short":"long", entry=a.price, stop=a.plan?.stop;

  return multipliers.map(m=>{

    let hits=0,stops=0,open=0;
    for(let i=Math.max(0,a.candles.length-80);i<a.candles.length;i++){

      else {if(b.low<=tp)hits++; else if(b.high>=stop)stops++; else open++;}
    }

    return {m,tp,hits,stops,open,score};
  }).sort((x,y)=>y.score-x.score);
}

function rangeModel(a,lookback=80){
  let c=a?.candles||[]; if(c.length<lookback+5)return {active:false,error:"Yeterli veri yok"};
  let prior=c.slice(-(lookback+1),-1), lastC=c.at(-1), price=a.price||lastC.close;
  let rh=Math.max(...prior.map(x=>x.high)), rl=Math.min(...prior.map(x=>x.low)), eq=(rh+rl)/2, width=(rh-rl)/(eq||1)*100;
  let atr=a.tech?.atr||ATR(c.map(x=>x.high),c.map(x=>x.low),c.map(x=>x.close)).at(-1)||price*.01;
  let tol=atr*.65, highTouches=prior.filter(x=>Math.abs(x.high-rh)<=tol || Math.abs(x.close-rh)<=tol).length, lowTouches=prior.filter(x=>Math.abs(x.low-rl)<=tol || Math.abs(x.close-rl)<=tol).length;
  let active=width<18 && highTouches>=1 && lowTouches>=1, devHigh=lastC.high>rh && lastC.close<rh, devLow=lastC.low<rl && lastC.close>rl;
  let volAvg=avg(prior.slice(-20).map(x=>x.volume))||1, breakoutUp=lastC.close>rh && lastC.volume>volAvg*1.35, breakoutDown=lastC.close<rl && lastC.volume>volAvg*1.35;
  let bias=devHigh?"SHORT_DEVIATION":devLow?"LONG_DEVIATION":breakoutUp?"VALID_BREAKOUT_UP":breakoutDown?"VALID_BREAKOUT_DOWN":price>eq?"RANGE_UPPER_HALF":"RANGE_LOWER_HALF";
  let setup=devHigh?{side:"SHORT",entry:price,stop:lastC.high+atr*.25,tp1:eq,tp2:rl}:devLow?{side:"LONG",entry:price,stop:lastC.low-atr*.25,tp1:eq,tp2:rh}:null;
  let quality=clamp((active?45:25)+(devHigh||devLow?30:0)+(width<10?10:0)+(highTouches+lowTouches)*3+(setup?10:0));
  let comment=!active?`Range şartları zayıf. Bant genişliği ${fmt(width,1)}%; yatay piyasa avantajı net değil.`:
    devHigh?"Range High üzerinde likidite alınmış ve kapanış tekrar bant içine dönmüş. Short deviation fikri oluşur. TP1 EQ, TP2 Range Low olarak izlenir.":
    devLow?"Range Low altında likidite alınmış ve kapanış tekrar bant içine dönmüş. Long deviation fikri oluşur. TP1 EQ, TP2 Range High olarak izlenir.":
    breakoutUp?"Range High üzerinde hacimli kapanış var; bu hareket sweep değil geçerli breakout adayıdır. Retest beklemek daha sağlıklı.":
    breakoutDown?"Range Low altında hacimli kapanış var; bu hareket sweep değil geçerli breakdown adayıdır. Retest beklemek daha sağlıklı.":
    "Aktif range var. Fiyat bant içinde; en yüksek avantaj genellikle uç bölgelerdeki deviation/sweep sonrası oluşur.";
  return {active,rh,rl,eq,width,highTouches,lowTouches,devHigh,devLow,breakoutUp,breakoutDown,bias,setup,quality,atr,comment};
}
function bodyConfirmedStructure(a){
  let c=a?.candles||[], sp=swingPoints(c,3), close=c.at(-1)?.close, high=c.at(-1)?.high, low=c.at(-1)?.low;
  if(!c.length||!sp.hi.length||!sp.lo.length)return {event:"Yetersiz veri",bos:false,choch:false,sweep:false,comment:"Swing verisi yok."};
  let lastHigh=sp.hi.at(-1), lastLow=sp.lo.at(-1), bosUp=close>lastHigh.price, bosDown=close<lastLow.price, wickUp=high>lastHigh.price && close<=lastHigh.price, wickDown=low<lastLow.price && close>=lastLow.price;
  let event=bosUp?"Kapanış teyitli BOS yukarı":bosDown?"Kapanış teyitli BOS aşağı":wickUp?"Fitil ihlali / üst sweep":wickDown?"Fitil ihlali / alt sweep":"Yapı kırılımı yok";
  let comment=wickUp||wickDown?"Fitil kırılımı BOS/CHOCH sayılmaz; sweep/likidite alımı olarak sınıflanır.":bosUp||bosDown?"Kırılım gövde kapanışıyla teyitli; yapı değişimi daha güvenilir.":"Bekleme modu; yapı kapanışla kırılmadı.";
  return {event,bos:bosUp||bosDown,direction:bosUp?"bull":bosDown?"bear":"neutral",sweep:wickUp||wickDown,lastHigh,lastLow,comment};
}
function validObReport(a){
  let c=a?.candles||[], obs=detectOrderBlocks(c), fvg=detectFVG(c), sp=swingPoints(c,3), ob=obs.at(-1);
  if(!ob)return {valid:false,count:0,total:3,ob:null,checks:[["FVG/Momentum",false],["BOS/CHOCH",false],["Likidite Sweep",false]],comment:"Yakın geçerli OB adayı yok."};
  let fvgAfter=fvg.some(g=>g.i>ob.i && g.i<=ob.i+5 && g.dir===ob.dir), closeAfter=c.slice(ob.i+1,Math.min(c.length,ob.i+8));
  let prevHigh=sp.hi.filter(x=>x.i<ob.i).at(-1), prevLow=sp.lo.filter(x=>x.i<ob.i).at(-1);
  let bos=ob.dir==="bull" ? (prevHigh && closeAfter.some(x=>x.close>prevHigh.price)) : (prevLow && closeAfter.some(x=>x.close<prevLow.price));
  let prior=c.slice(Math.max(0,ob.i-12),ob.i+1), sweep=false;
  if(prior.length>2){
    if(ob.dir==="bull"){let prevMin=Math.min(...prior.slice(0,-1).map(x=>x.low)), x=prior.at(-1); sweep=x.low<prevMin && x.close>prevMin;}
    else {let prevMax=Math.max(...prior.slice(0,-1).map(x=>x.high)), x=prior.at(-1); sweep=x.high>prevMax && x.close<prevMax;}
  }
  let checks=[["OB sonrası FVG / momentum",!!fvgAfter],["OB kaynaklı BOS/CHOCH",!!bos],["Öncesinde likidite sweep",!!sweep]], count=checks.filter(x=>x[1]).length, valid=count>=2;
  return {valid,count,total:3,ob,checks,comment:valid?`OB adayı ${count}/3 şartı sağlıyor; geçerlilik orta/yüksek.`:`OB adayı sadece ${count}/3 şartı sağlıyor; zayıf kabul edilmeli.`};
}
function fvgQualityReport(a){

  if(f.mitigationIndex){let x=c[f.mitigationIndex]; reaction=f.dir==="bull"?(x.close>x.open&&x.close>f.mid):(x.close<x.open&&x.close<f.mid);}
  let checks=[["Ortadaki mum impulsif",impulse],["İlk/az test edilmiş bölge",firstTouch],["Trend/yapı yönüyle uyumlu",trendAlign],["Mitigation sonrası tepki",reaction],["Bölge fiyat yakınında",Math.abs(((a.price||c.at(-1).close)-f.mid)/(a.price||c.at(-1).close))*100<4]];
  let score=clamp(20+checks.filter(x=>x[1]).length*16); return {score,fvg:f,checks,comment:`FVG kalite skoru ${fmt(score,0)}. ${checks.filter(x=>x[1]).length}/5 şart sağlandı.`};

function oteScanner(a){
  let c=a?.candles||[], sp=swingPoints(c,4), price=a?.price||c.at(-1)?.close;
  if(!c.length||sp.hi.length<1||sp.lo.length<1)return {active:false,comment:"Swing verisi yetersiz."};
  let ms=paMarketStructure(c), high=sp.hi.at(-1), low=sp.lo.at(-1), bullish=low.i<high.i;
  if(ms.bias==="BULLISH")bullish=true; if(ms.bias==="BEARISH")bullish=false;
  let swingHigh=high.price, swingLow=low.price, range=Math.abs(swingHigh-swingLow)||price*.01, zoneTop,zoneMid,zoneBot,side;
  if(bullish){side="LONG"; zoneTop=swingHigh-range*.618; zoneMid=swingHigh-range*.705; zoneBot=swingHigh-range*.786;}
  else{side="SHORT"; zoneBot=swingLow+range*.618; zoneMid=swingLow+range*.705; zoneTop=swingLow+range*.786;}
  let loZ=Math.min(zoneTop,zoneBot), hiZ=Math.max(zoneTop,zoneBot), inZone=price>=loZ&&price<=hiZ, ltfConfirm=bodyConfirmedStructure(a);
  let confirmed=inZone && ((side==="LONG"&&ltfConfirm.direction==="bull")||(side==="SHORT"&&ltfConfirm.direction==="bear"));
  let stop=side==="LONG"?swingLow:swingHigh, target=side==="LONG"?swingHigh:swingLow, rr=Math.abs(target-price)/(Math.abs(price-stop)||1);
  return {active:inZone,confirmed,side,zoneTop,zoneMid,zoneBot,loZ,hiZ,swingHigh,swingLow,stop,target,rr,ltfConfirm,comment:inZone?`Fiyat OTE altın bölgesinde. ${confirmed?"LTF kapanış teyidi var.":"LTF kapanış teyidi beklenmeli."}`:`Fiyat OTE bölgesinde değil; limit giriş yerine bekleme daha disiplinli.`};

function vpaReport(a){
  let c=a?.candles||[]; if(c.length<25)return {rvol:0,absorption:false,exhaustion:false,volumeDivergence:false,comment:"Yeterli hacim verisi yok."};

/* ===================== v5.0.7 Engine ===================== */
function omniDirection(sig){
  sig=String(sig||"");
  if(sig.includes("LONG"))return"LONG";
  if(sig.includes("SHORT"))return"SHORT";
  return"NONE";
}
function omniSignalSetup(a){
  if(!a)return"NO_DATA";
  try{
    if(typeof paEngine==="function"){
      let pa=paEngine(a);
      if(pa&&pa.detected)return String(pa.detected).replace(/\s+/g," ").trim();
    }
  }catch(e){}
  let sig=omniDirection(a.signal), stt=a.state||"UNKNOWN";
  if(stt==="COMPRESSION")return"Compression Breakout";
  if(stt==="ACCUMULATION")return sig==="LONG"?"Accumulation Long":"Accumulation";
  if(stt==="DISTRIBUTION")return sig==="SHORT"?"Distribution Short":"Distribution";
  if(stt==="BREAKDOWN")return"Breakdown Continuation";
  if(stt==="EXPANSION")return sig==="LONG"?"Expansion Pullback/Breakout":sig==="SHORT"?"Expansion Short":"Expansion";
  if(a.fakeout?.type)return"Liquidity Sweep / Fakeout";
  return stt;
}
function omniNearestDistancePct(a,side){
  if(!a||!a.price||!a.levels)return null;
  if(side==="LONG"){
    let r=(a.levels.resistances||[]).filter(x=>x.price>a.price).sort((x,y)=>x.price-y.price)[0]||a.levels.nearestResistance;
    return r&&r.price?((r.price-a.price)/a.price*100):null;
  }
  if(side==="SHORT"){
    let s=(a.levels.supports||[]).filter(x=>x.price<a.price).sort((x,y)=>y.price-x.price)[0]||a.levels.nearestSupport;
    return s&&s.price?((a.price-s.price)/a.price*100):null;
  }
  return null;
}
function omniOutcomeR(histA,future,side){
  if(!histA?.plan||!future?.length)return 0;
  let entry=histA.plan.entry||histA.price, stop=histA.plan.stop, tp=histA.plan.tp1||histA.plan.tp2;
  let risk=Math.abs(entry-stop)||Math.abs(entry)*0.01;
  let hit=0;
  for(let bar of future){
    if(side==="LONG"){
      if(bar.low<=stop){hit=-1;break}
      if(bar.high>=tp){hit=Math.abs(tp-entry)/risk;break}
    }else if(side==="SHORT"){
      if(bar.high>=stop){hit=-1;break}
      if(bar.low<=tp){hit=Math.abs(entry-tp)/risk;break}
    }
  }
  if(hit!==0)return hit;
  let last=future.at(-1)?.close||entry;
  return side==="LONG"?(last-entry)/risk:(entry-last)/risk;
}
function omniHistoricalStats(a){
  if(!a?.candles?.length||!a.signal||a.signal==="NO_TRADE")return{sample:0,winRate:null,avgR:0,pf:0,ev:0,confidence:0,note:"Sinyal yok"};
  window.__omniCalibCache=window.__omniCalibCache||{};
  let side=omniDirection(a.signal), setup=omniSignalSetup(a);
  let c=a.candles, lastClose=c.at(-1)?.close||0;
  let key=[a.symbol,st.tf,c.length,Math.round(lastClose*100000),side,setup].join("|");
  if(window.__omniCalibCache[key])return window.__omniCalibCache[key];
  let base=window.__omniBaseAnalyze||analyze;
  let all=[], same=[];
  let start=Math.max(90,c.length-190), end=Math.max(start,c.length-8);
  for(let i=start;i<end;i+=3){
    let h;
    try{h=base(a.symbol,c.slice(0,i),{dp:50,entropy:50,state:"EXPANSION",isChaotic:false},"CALIB",null,"calib",null,{})}catch(e){continue}
    let hSide=omniDirection(h.signal);
    if(hSide!==side)continue;
    let future=c.slice(i,Math.min(c.length,i+8));
    let r=omniOutcomeR(h,future,hSide);
    let rec={r,setup:omniSignalSetup(h),signal:h.signal,state:h.state};
    all.push(rec);
    if(rec.setup===setup)same.push(rec);
    if(all.length>90)break;
  }
  let sample=same.length>=10?same:all;
  let wins=sample.filter(x=>x.r>0),loss=sample.filter(x=>x.r<=0);
  let winRate=sample.length?wins.length/sample.length:null;
  let avgR=sample.length?sample.reduce((s,x)=>s+x.r,0)/sample.length:0;
  let grossW=wins.reduce((s,x)=>s+x.r,0),grossL=Math.abs(loss.reduce((s,x)=>s+x.r,0));
  let pf=grossW/(grossL||1);
  let confidence=sample.length>=30?1:sample.length>=20?.82:sample.length>=12?.64:sample.length>=8?.45:.22;
  let out={sample:sample.length,winRate,avgR,pf,ev:avgR,confidence,setup,mode:same.length>=10?"setup+direction":"direction-only",note:sample.length?`${sample.length} örnek · ${same.length>=10?"setup eşleşti":"yön bazlı"}`:"Örnek yok"};
  window.__omniCalibCache[key]=out;
  return out;
}
function omniMtfVote(a){
  try{
    let d=st.mtf?.[a.symbol]?.data;
    if(!d)return{status:"Yok",score:0,note:"MTF verisi yüklenmemiş"};
    let side=omniDirection(a.signal), tfs=Object.keys(d), votes=0,total=0,block=false;
    for(let tf of tfs){
      let r=d[tf]; if(!r||!r.signal)continue; total++;
      let sd=omniDirection(r.signal);
      if(sd===side)votes++;
      if(side==="LONG"&&(r.state==="CHAOS"||r.state==="BREAKDOWN"))block=true;
      if(side==="SHORT"&&r.state==="ACCUMULATION")block=true;
    }
    let ratio=total?votes/total:0;
    return{status:total?`${votes}/${total}`:"Yok",score:ratio,note:block?"Üst zaman dilimi riskli":ratio>=.5?"MTF uyum var":"MTF uyum zayıf",block};
  }catch(e){return{status:"Hata",score:0,note:String(e.message||e)}}
}
function omniCalibrateAnalysis(a){
  if(!a||a.error||!a.signal)return a;
  a.rawSignal=a.rawSignal||a.signal;
  let side=omniDirection(a.signal);
  let setup=omniSignalSetup(a);
  let reasons=[], positives=[], penalties=0, reject=false;

  let trend=seg.length>20?Math.abs((seg.at(-1).close-seg[0].close)/(seg[0].close||1))*100:0;
  let profile=trend>12?"Trend Coin":wick>.62?"Fakeout/Wick Coin":"Dengeli Coin";
  let rule=profile==="Fakeout/Wick Coin"?"Breakout için retest zorunlu":profile==="Trend Coin"?"Pullback devam sinyalleri öncelikli":"A kalite setup bekle";
  let setups={};items.forEach(x=>{let k=x.setup||"UNKNOWN";setups[k]=setups[k]||{n:0,w:0,ev:0};setups[k].n++;if(/WIN/.test(x.status))setups[k].w++;setups[k].ev+=x.resultR||0});
  let best=Object.entries(setups).map(([k,v])=>({setup:k,n:v.n,win:v.n?v.w/v.n:0,ev:v.n?v.ev/v.n:0})).sort((a,b)=>b.ev-a.ev)[0];
  return{symbol:sym,profile,rule,liveN:items.length,liveWin:win,liveEv:ev,wick,trend,best};
}

function omniApplyIntelOverlay(a){
  if(!a||!a.symbol)return a;
  let intel=st.intel?.[a.symbol] || omniIntelStore().items?.[a.symbol]?.data;
  if(!intel||!intel.overlay)return a;
  a.intel=intel;
  let side=omniDirection(a.rawSignal||a.verification?.rawSignal||a.signal);
  if(side==="NONE")return a;
  let ov=intel.overlay, reasons=ov.reasons||[], original=a.signal;
  let final=original, sizeScale=ov.sizeScale??1;
  /* Hard filter only for red events: hack/exploit/delisting/depeg/halt etc. */
  if(ov.hardBlock){
    final="NO_TRADE";
  }else if(ov.action==="SIZE_DOWN"){
    if(a.plan&&a.plan.size){a.plan.size*=sizeScale;a.plan.positionUsd=(a.plan.positionUsd||a.plan.size*a.price)*sizeScale}
    /* crowded/social risk does not automatically flip direction; it reduces size or pushes weak signals to WAIT */
    if((a.verification?.confidence||a.calibration?.confidence||Math.max(a.longQ||0,a.shortQ||0))<66)final="WAIT";
  }else if(ov.action==="CAUTION"){
    if(a.plan&&a.plan.size){a.plan.size*=Math.min(1,sizeScale||.8);a.plan.positionUsd=(a.plan.positionUsd||a.plan.size*a.price)*Math.min(1,sizeScale||.8)}
  }
  a.signal=final;
  a.intelDecision={version:"5.0.6",rawSignal:original,finalSignal:final,score:ov.score,action:ov.action,sizeScale,hardBlock:ov.hardBlock,reasons};
  a.field=a.field||{};a.field.marketIntelScore=ov.score;a.field.intelAction=ov.action;
  return a;
}

function drawUnifiedChart(id,a){
  drawChart(id,a,true);

  let ctx=cn.getContext("2d"),r=cn.getBoundingClientRect();
  try{

    let extra=[];
    if(!rm.error)extra.push(rm.rh,rm.eq,rm.rl,rm.setup?.stop,rm.setup?.tp1,rm.setup?.tp2);
    if(o.loZ)extra.push(o.zoneTop,o.zoneMid,o.zoneBot,o.stop,o.target);
    (pa.fvg||[]).slice(-2).forEach(z=>extra.push(z.low,z.high));
    (pa.obs||[]).slice(-2).forEach(z=>extra.push(z.low,z.high));
    let sc=chartScaleFor(a,extra), y=v=>sc.y(v,r.height);
    if(!rm.error){
      drawOverlayHline(ctx,y(rm.rh),r.width,"#ff4d67","RH");
      drawOverlayHline(ctx,y(rm.eq),r.width,"#ffd166","EQ");
      drawOverlayHline(ctx,y(rm.rl),r.width,"#16f08b","RL");
    }
    if(o.loZ){
      drawOverlayZone(ctx,y(o.loZ),y(o.hiZ),r.width,"rgba(167,139,250,.12)","OTE");
      drawOverlayHline(ctx,y(o.zoneMid),r.width,"#22d3ee","OTE 0.705");
    }
    function rectZone(z,color,label){
      let c=a.candles,data=last(c,120),off=c.length-data.length,pad=28,x=i=>pad+i*(r.width-2*pad)/(Math.max(1,data.length-1));
      let start=Math.max(0,(z.i||off)-off),x0=x(start),x1=r.width-28,yy1=y(z.high),yy2=y(z.low);
      ctx.fillStyle=color;ctx.fillRect(x0,Math.min(yy1,yy2),x1-x0,Math.abs(yy2-yy1));
      ctx.strokeStyle=color.replace(".14",".65");ctx.strokeRect(x0,Math.min(yy1,yy2),x1-x0,Math.abs(yy2-yy1));
      ctx.fillStyle="#dbeafe";ctx.font="10px monospace";ctx.fillText(label,x0+4,Math.min(yy1,yy2)-4);
    }
    (pa.fvg||[]).slice(-2).forEach(z=>rectZone(z,z.dir==="bull"?"rgba(22,240,139,.14)":"rgba(255,77,103,.14)","FVG"));
    (pa.obs||[]).slice(-2).forEach(z=>rectZone(z,z.dir==="bull"?"rgba(96,165,250,.14)":"rgba(251,146,60,.14)","OB"));
  }catch(e){}
}

function researchCacheKey(sym,type){
  let a=st.rows[sym], c=a?.candles||[], last=c.at(-1)?.time||0;
  return `${type}_${st.tf}_${sym}_${c.length}_${last}`;
}
function researchResult(sym,type="advanced"){
  st.researchCache=st.researchCache||{};
  let key=researchCacheKey(sym,type);
  if(st.researchCache[key])return st.researchCache[key];
  let a=st.rows[sym], c=a?.candles||[];
  if(!a||!c.length)return null;
  let result=null, extra={};
  try{
    if(type==="simple"){
      result=runBt(c); extra.label="Klasik Backtest";
    }else if(type==="pa"){
      let cmp=paBacktestCompare(c); result=cmp.filtered; extra.base=cmp.base; extra.label="PA Filtreli";
    }else if(type==="wf"){
      let wf=walkForward(c); result=wf.summary?{pnl:wf.summary.pnl,ret:wf.summary.ret,win:wf.summary.win,pf:0,dd:wf.summary.dd,trades:{length:wf.summary.trades},expectancy:wf.summary.trades?wf.summary.pnl/wf.summary.trades:0,avgR:0}:null; extra.wf=wf; extra.label="Walk-Forward";
    }else if(type==="optimizer"){
      let opt=optimizerResults(c)[0]; result=opt?.result; extra.opt=opt; extra.label=opt?.name||"Optimizer";
    }else{
      result=runAdvancedBt(c); extra.label="Gelişmiş Backtest";
    }
  }catch(e){result=null; extra.error=String(e)}
  if(!result)return null;
  let trades=Array.isArray(result.trades)?result.trades.length:(result.trades?.length||result.trades||0);
  let pf=result.pf||0, win=result.win||0, dd=result.dd||0, ret=result.ret||0, expectancy=result.expectancy||0, avgR=result.avgR||0;
  let score = (pf*34) + (win*30) + (avgR*18) + (expectancy/10) + (ret*.7) - (dd*85) + Math.min(18,trades*.35);
  if(type==="wf") score = (ret*.9) + (win*32) - (dd*90) + Math.min(20,trades*.45);
  if(type==="pa" && extra.base) score += (result.pf-(extra.base.pf||0))*18 + ((result.win||0)-(extra.base.win||0))*26;
  let out={symbol:sym,a,result,extra,score,trades,pf,win,dd,ret,expectancy,avgR};
  st.researchCache[key]=out;
  return out;
}

    if(r.levels?.nearestSupport&&r.price&&((r.price-r.levels.nearestSupport.price)/r.price*100)<1.5)reasons["Desteğe çok yakındı"]=(reasons["Desteğe çok yakındı"]||0)+1;

    if((r.field?.contradiction||0)>35)reasons["Çelişki yüksekti"]=(reasons["Çelişki yüksekti"]||0)+1;

  st.derivCache=st.derivCache||{};
  let key=`${sym}_${st.tf}`;
  let cached=st.derivCache[key];
  if(!force && cached && Date.now()-cached.ts<25000){
    st.deriv={loading:false,symbol:sym,data:cached.data,error:cached.error,lastUpdate:cached.ts};
    return;
  }
  st.deriv={loading:true,symbol:sym,data:null,error:null,lastUpdate:Date.now()};
  render();
  let d=await fetchDerivativesForSymbol(sym);

  st.derivCache[key]={ts:Date.now(),data:err?null:d,error:err};

  render();

function drawSpark(id,series,opt={}){
  let cn=$(id); if(!cn)return;
  let ctx=cn.getContext("2d"),r=cn.getBoundingClientRect(),d=window.devicePixelRatio||1;
  cn.width=r.width*d; cn.height=r.height*d; ctx.scale(d,d); ctx.clearRect(0,0,r.width,r.height);
  let vals=(series||[]).map(x=>+("value" in x?x.value:x)).filter(v=>Number.isFinite(v));
  if(vals.length<2){
    ctx.fillStyle="#07111d";ctx.fillRect(0,0,r.width,r.height);
    ctx.fillStyle="#9fb0c8";ctx.font="13px monospace";ctx.textAlign="center";
    ctx.fillText(opt.emptyText||"Bu coin için yeterli geçmiş seri yok",r.width/2,r.height/2);
    return;
  }
  let min=Math.min(...vals),max=Math.max(...vals); if(min===max){min-=1;max+=1}
  let pad=28,x=i=>pad+i*(r.width-2*pad)/Math.max(1,vals.length-1),y=v=>r.height-pad-(v-min)/(max-min||1)*(r.height-2*pad);
  ctx.strokeStyle="#233149";ctx.lineWidth=1;
  for(let i=0;i<5;i++){let yy=pad+i*(r.height-2*pad)/4;ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(r.width-pad,yy);ctx.stroke()}
  if(opt.zero){let z=y(0);ctx.setLineDash([6,6]);ctx.strokeStyle="#485b78";ctx.beginPath();ctx.moveTo(pad,z);ctx.lineTo(r.width-pad,z);ctx.stroke();ctx.setLineDash([])}
  ctx.beginPath();ctx.lineWidth=opt.lineWidth||2;ctx.strokeStyle=opt.color||"#22d3ee";
  vals.forEach((v,i)=>{let xx=x(i),yy=y(v);if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy)});ctx.stroke();
  if(opt.fill){ctx.lineTo(x(vals.length-1),r.height-pad);ctx.lineTo(x(0),r.height-pad);ctx.closePath();let grad=ctx.createLinearGradient(0,pad,0,r.height-pad);grad.addColorStop(0,(opt.color||"#22d3ee")+"44");grad.addColorStop(1,"#0000");ctx.fillStyle=grad;ctx.fill()}
  ctx.fillStyle="#9eb0cb";ctx.font="11px monospace";ctx.textAlign="left";ctx.fillText(opt.labelTop||fmt(max,2),pad,16);ctx.fillText(opt.labelBottom||fmt(min,2),pad,r.height-8);
  if(opt.currentLabel){ctx.textAlign="right";ctx.fillStyle="#d8e4f8";ctx.fillText(opt.currentLabel,r.width-pad,16)}
}

function aggregateDepthV477(depth,price){
  let bands=[0.15,0.3,0.5,0.75,1,1.5,2,3],rows=[];
  if(!depth||!price)return bands.map(b=>({band:b,bid:0,ask:0}));
  for(let p of bands){
    let bid=0,ask=0,bidPx=price*(1-p/100),askPx=price*(1+p/100);
    (depth.bids||[]).forEach(([px,qty])=>{px=+px;qty=+qty;if(px>=bidPx&&px<=price)bid+=px*qty});
    (depth.asks||[]).forEach(([px,qty])=>{px=+px;qty=+qty;if(px<=askPx&&px>=price)ask+=px*qty});
    rows.push({band:p,bid,ask});
  }
  return rows;
}

  ctx.clearRect(0,0,w,h);
  let bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#07111d");bg.addColorStop(1,"#02050a");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  let left=w*.08,right=w*.92,mid=w/2,top=34,bottom=h-30,rowH=(bottom-top)/Math.max(1,rows.length),max=Math.max(...rows.map(x=>Math.max(x.bid,x.ask)),1);
  ctx.strokeStyle="#26354f";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mid,top-12);ctx.lineTo(mid,bottom+6);ctx.stroke();
  ctx.fillStyle="#d7e2f4";ctx.font="12px ui-monospace,Consolas,monospace";ctx.textAlign="left";ctx.fillText("BID YOĞUNLUĞU",left,20);ctx.textAlign="right";ctx.fillText("ASK YOĞUNLUĞU",right,20);
  rows.forEach((row,i)=>{
    let y=top+i*rowH+5,bh=rowH-10,bw=(mid-left-18)*(row.bid/max),aw=(right-mid-18)*(row.ask/max);
    let gb=ctx.createLinearGradient(mid-bw-10,y,mid-10,y);gb.addColorStop(0,"#0f3427");gb.addColorStop(1,"#16f08b");
    roundRectFill(ctx,mid-bw-10,y,bw,bh,5,gb);
    let ga=ctx.createLinearGradient(mid+10,y,mid+10+aw,y);ga.addColorStop(0,"#742033");ga.addColorStop(1,"#ff4d67");
    roundRectFill(ctx,mid+10,y,aw,bh,5,ga);
    ctx.fillStyle="#b7c6da";ctx.font="11px ui-monospace,Consolas,monospace";ctx.textAlign="center";ctx.fillText(`±${row.band}%`,mid,y+bh/2+4);
    ctx.textAlign="left";ctx.fillText(`$${compact(row.bid)}`,left,y+bh/2+4);
    ctx.textAlign="right";ctx.fillText(`$${compact(row.ask)}`,right,y+bh/2+4);
  });
  ctx.fillStyle="#ffd166";ctx.font="12px ui-monospace,Consolas,monospace";ctx.textAlign="center";
  ctx.fillText(`Referans: $${fmt(price)}`,mid,bottom+18);
}

function allAttentionSymbols(){return typeof allTradeSymbols==="function"?allTradeSymbols():(Object.keys(st.rows||{}).length?Object.keys(st.rows):Object.keys(CG_IDS))}
function getSecureStore(){try{return JSON.parse(localStorage.getItem("omni_api_keys")||"{}")}catch{return{}}}

function maskKey(k){if(!k)return"";return k.length<=8?"********":k.slice(0,4)+"••••••"+k.slice(-4)}
function cgKey(){return getSecureStore().coingecko||""}
function duneKey(){return getSecureStore().dune||""}
function attCache(){st.attCache=st.attCache||{};return st.attCache}
function attKey(sym){return `${sym}_${st.tf||"1h"}`}
function getLocalAttCache(sym){try{let x=JSON.parse(localStorage.getItem("omni_attention_cache")||"{}");return x[attKey(sym)]||null}catch{return null}}
function setLocalAttCache(sym,data){try{let x=JSON.parse(localStorage.getItem("omni_attention_cache")||"{}");x[attKey(sym)]={ts:Date.now(),data};localStorage.setItem("omni_attention_cache",JSON.stringify(x))}catch{}}
function attentionSymbols(){let syms=allAttentionSymbols();return syms.sort((a,b)=>a==="BTCUSDT"?-1:b==="BTCUSDT"?1:a.localeCompare(b))}

window.attPick=function(page,sym){st.attPageSel=st.attPageSel||{};st.attPageSel[page]=sym;st.sel=sym;render();loadAttention([sym],false,false)}
window.attSearch=function(v){st.attSearch=(v||"").toUpperCase().trim();render()}

async function fetchAttention(symbols,includeDune=false,force=false){
  let hdr={"content-type":"application/json"};
  if(cgKey())hdr["x-omni-cg-key"]=cgKey();
  if(includeDune&&duneKey())hdr["x-omni-dune-key"]=duneKey();
  let qs=new URLSearchParams({symbols:symbols.join(","),tf:st.tf||"1h",includeDune:includeDune?"1":"0",force:force?"1":"0"});
  let r=await fetch(`/api/attention?${qs.toString()}`,{headers:hdr});
  let j=await r.json();
  if(!r.ok||j.error)throw new Error(j.error||("HTTP "+r.status));
  return j;
}
async function loadAttention(symbols=null,includeDune=false,force=false){
  symbols=symbols&&symbols.length?symbols:attentionSymbols();
  st.attLoading=true;render();
  try{
    let j=await fetchAttention(symbols,includeDune,force);
    let cache=attCache();
    (j.coins||[]).forEach(c=>{cache[c.symbol]=c;setLocalAttCache(c.symbol,c)});
    if(j.dune){cache[j.dune.symbol]=cache[j.dune.symbol]||{symbol:j.dune.symbol};cache[j.dune.symbol].dune=j.dune;setLocalAttCache(j.dune.symbol,cache[j.dune.symbol])}
    st.attMeta={source:j.source,updatedAt:Date.now(),errors:j.errors||[]};st.attError="";
  }catch(e){st.attError=e.message||String(e);log("Attention hata: "+st.attError)}
  st.attLoading=false;render();
}
function loadCachedAttention(){let cache=attCache();attentionSymbols().forEach(s=>{if(!cache[s]){let x=getLocalAttCache(s);if(x&&Date.now()-x.ts<1000*60*60*8)cache[s]=x.data}})}

function attScoreClass(v){return v>=70?"attGood":v>=55?"attCyan":v>=40?"attWarn":"attBad"}
function attPill(v,label=null){v=+v||0;return `<div><div class="attScore ${attScoreClass(v)}">${fmt(v,0)}</div><div class="attBar"><i style="width:${clamp(v)}%"></i></div>${label?`<div class="attMini">${label}</div>`:""}</div>`}
function attentionDecision(a,row){
  let sig=a?.signal||"NO_TRADE",score=row?.attentionScore||0,dune=row?.dune?.onchainScore||0,combo=score*.75+dune*.25;
  if(sig.includes("LONG")){if(combo>=72)return"LONG TEYİTLİ";if(score>=55)return"LONG / İLGİ ORTA";if(score<35)return"LONG ZAYIF TEYİT"}
  if(sig.includes("SHORT")){if(score>=75)return"SHORT AMA FOMO RİSKİ";if(score<40)return"SHORT TEYİTLİ"}
  return combo>=70?"İLGİ YÜKSEK":combo>=50?"NÖTR/İZLE":"İLGİ ZAYIF";
}
function attentionNarrative(row,a=null){
  if(!row)return"Veri bekleniyor.";

  if(row.trendingRank)parts.push(`CoinGecko trend listesinde #${row.trendingRank}.`);
  if(row.volumeMcapPct!=null)parts.push(`Hacim/marketcap oranı %${fmt(row.volumeMcapPct,2)}.`);
  if(row.priceChange24h!=null)parts.push(`24s momentum ${fmtSigned(row.priceChange24h,2)}%.`);
  if(row.priceChange7d!=null)parts.push(`7g momentum ${fmtSigned(row.priceChange7d,2)}%.`);
  if(row.dune){let d=row.dune;if(d.status==="completed")parts.push(`Dune DEX hacmi $${compact(d.dexVolumeUsd||0)}, net akış $${compact(d.netBuyUsd||0)}.`);else if(d.status)parts.push(`Dune durumu: ${d.status}.`)}

  return parts.join(" ");
